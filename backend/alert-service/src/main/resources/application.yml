server:
  port: 8085

spring:
  application:
    name: alert-service
  datasource:
    url: jdbc:mysql://localhost:3306/meditrack_alert_service
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: alert-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
  task:
    scheduling:
      pool:
        size: 10
      thread-name-prefix: alert-scheduler-

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    metadata-map:
      management.context-path: /actuator
  client:
    service-url:
      defaultZone: http://admin:admin123@localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,kafka
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# MediTrack Alert Service Configuration
meditrack:
  alert:
    # Alert Processing Configuration
    processing:
      max-concurrent-alerts: 100
      alert-timeout-minutes: 30
      auto-escalation-enabled: true
      batch-processing-size: 50
    
    # Escalation Configuration
    escalation:
      default-timeout-minutes: 5
      max-escalation-levels: 3
      escalation-check-interval-seconds: 60
      auto-escalation-enabled: true
      escalation-retry-attempts: 3
    
    # Notification Configuration
    notification:
      max-retry-attempts: 3
      retry-delay-seconds: 30
      batch-notification-size: 100
      notification-timeout-seconds: 120
      multi-channel-enabled: true
    
    # Email Notification Configuration
    email:
      enabled: true
      smtp-host: smtp.gmail.com
      smtp-port: 587
      username: meditrack-alerts@gmail.com
      password: ${EMAIL_PASSWORD}
      from-email: meditrack-alerts@gmail.com
      from-name: "MediTrack Alerts"
      ssl-enabled: true
      tls-enabled: true
    
    # SMS Notification Configuration
    sms:
      enabled: true
      provider: twilio
      account-sid: ${TWILIO_ACCOUNT_SID}
      auth-token: ${TWILIO_AUTH_TOKEN}
      from-number: ${TWILIO_FROM_NUMBER}
      max-length: 160
    
    # Push Notification Configuration
    push:
      enabled: true
      firebase-server-key: ${FIREBASE_SERVER_KEY}
      max-badge-count: 99
      notification-ttl-seconds: 3600
    
    # Webhook Notification Configuration
    webhook:
      enabled: true
      timeout-seconds: 30
      retry-attempts: 3
      signature-header: X-Meditrack-Signature
      secret-key: ${WEBHOOK_SECRET_KEY}
    
    # Saga Configuration
    saga:
      timeout-minutes: 30
      retry-attempts: 3
      compensation-enabled: true
      saga-execution-pool-size: 20
    
    # Suppression Configuration
    suppression:
      quiet-hours-enabled: true
      quiet-hours-start: "22:00"
      quiet-hours-end: "06:00"
      suppression-window-minutes: 60
      max-suppressed-alerts: 1000
    
    # Audit Configuration
    audit:
      enabled: true
      retention-days: 365
      batch-size: 1000
      audit-level: INFO
      include-sensitive-data: false
    
    # Rate Limiting Configuration
    rate-limiting:
      enabled: true
      requests-per-minute: 1000
      burst-size: 100
      cleanup-interval-minutes: 15
    
    # Circuit Breaker Configuration
    circuit-breaker:
      enabled: true
      failure-threshold: 5
      timeout-seconds: 30
      recovery-timeout-seconds: 60

# Logging Configuration
logging:
  level:
    com.meditrack.alert: DEBUG
    org.springframework.kafka: INFO
    org.springframework.scheduling: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/alert-service.log
    max-size: 100MB
    max-history: 30
